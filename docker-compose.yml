services:
  postgres:
    image: postgres:16-alpine
    container_name: vk_bot_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vk_bot
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vk_bot"]
      interval: 5s
      timeout: 5s
      retries: 10

  # VK-секреты и LLM — из .env на хосте (файл не копируется в образ, см. .dockerignore).
  web:
    build: .
    container_name: vk_bot_web
    ports:
      - "4567:4567"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/vk_bot
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg_data:
